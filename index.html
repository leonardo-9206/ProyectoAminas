<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aminas - Infusiones Pediátricas</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0f4f8">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Aminas PWA</h1>
            <p class="subtitle">Calculadora de Infusiones Pediátricas</p>
        </header>

        <section class="tabs-section" id="tabs-container">
            <!-- Pestañas dinámicas aquí -->
        </section>

        <section class="patient-section">
            <div class="patient-header">
                <h2 id="current-patient-name" contenteditable="true" title="Toca para renombrar">Paciente 1</h2>
                <span style="font-size: 14px; color: gray; margin-left: 10px; cursor: pointer;" title="Toca el nombre para editar">✏️ (Toca para editar)</span>
                <div style="flex-grow: 1;"></div>
                <button id="btn-delete-patient" class="btn btn-outline-danger">Borrar Paciente</button>
            </div>
            <div class="input-group">
                <label for="peso">Peso del Paciente (kg):</label>
                <input type="number" id="peso" step="0.1" min="0" placeholder="Ej. 10.5">
            </div>
        </section>

        <section class="table-section">
            <div class="table-responsive">
                <table id="infusiones-table">
                    <thead>
                        <tr>
                            <th>Medicamento</th>
                            <th>Dosis Real</th>
                            <th>Unidad</th>
                            <th>Fármaco</th>
                            <th>Diluyente (ml)</th>
                            <th>Vol. Final (ml)</th>
                            <th>Velocidad (ml/h)</th>
                            <th>Equivalencia (1 ml/h)</th>
                            <th>Velocidad 2 (ml/h)</th>
                            <th>Equivalencia 2</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Las filas se insertarán dinámicamente -->
                    </tbody>
                </table>
            </div>
            <div class="actions">
                <button id="btn-add-row" class="btn btn-primary">+ Agregar Medicamento</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado', reg))
                    .catch(err => console.error('Error registrando SW', err));
            });
        }
    </script>
</body>
</html>
